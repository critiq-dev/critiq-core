apiVersion: critiq.dev/v1alpha1
kind: Rule
metadata:
  id: ts.correctness.possible-null-dereference
  title: Possible null or undefined dereference
  summary: Nullable values should be guarded before property access or invocation to prevent runtime TypeError crashes.
  rationale: "Dereferencing a value that can still be null or undefined causes avoidable runtime crashes (TypeError: cannot read property of null) on common unhappy paths. The data-flow analysis is deliberately conservative: it identifies values with nullable provenance but cannot always determine whether a guard exists before the dereference point. In practice, well-maintained TypeScript codebases routinely add guards (if-return, if-throw, short-circuit OR, optional chaining) that the analysis cannot see through, producing high noise relative to signal. This rule should be treated as a broad-minded lint that flags potentially risky dereferences for manual review, not as a definitive bug detector."
  tags:
    - correctness
    - "null"
    - rules-catalog
    - crq-cor-001
  stability: experimental
  appliesTo: block
scope:
  languages:
    - typescript
    - javascript
  paths:
    exclude:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/__tests__/**"
      - "**/tests/**"
      - "**/test/**"
      - "**/e2e/**"
      - "**/*.stories.*"
      - "**/*.generated.*"
      - "**/generated/**"
      - "**/__generated__/**"
      - "**/vendor/**"
      - "**/node_modules/**"
      - "**/scripts/**"
      - "**/fixtures/**"
match:
  fact:
    kind: data-flow.possible-null-dereference
    bind: issue
emit:
  finding:
    category: correctness.null
    severity: low
    confidence: 0.40
    tags:
      - correctness
      - "null"
  message:
    title: Guard nullable values before dereferencing
    summary: "`${captures.issue.text}` dereferences a value that may still be null or undefined, which will throw a TypeError at runtime if the value is nullish."
  remediation:
    summary: Add an explicit guard (`if (x)`, `x ?? fallback`), use optional chaining (`x?.prop`), or provide a default before dereferencing the value to prevent runtime TypeError crashes.
