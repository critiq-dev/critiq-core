apiVersion: critiq.dev/v1alpha1
kind: Rule
metadata:
  id: ts.correctness.duplicate-import-source
  title: Duplicate imports from the same module
  summary: Two or more value imports are declared from the same module path. Type-only imports are tracked separately and will not trigger duplication with value imports.
  rationale: Multiple value import declarations for one module increase bundle noise and can diverge over time. Type-only imports are intentionally kept separate for compile-time erasure and tree-shaking, so a type-only import followed by a value import from the same module is not flagged.
  tags:
    - correctness
    - modules
    - rules-catalog
    - crq-cor-024
    - public-directory-parity
  stability: stable
  appliesTo: file
scope:
  languages:
    - typescript
    - javascript
match:
  fact:
    kind: language.duplicate-import-source
    bind: issue
emit:
  finding:
    category: correctness.modules
    severity: low
    confidence: 0.9
    tags:
      - correctness
      - modules
  message:
    title: Consolidate duplicate imports
    summary: "`${captures.issue.text}` imports from a module path already imported above."
  remediation:
    summary: Merge value named imports into a single `import` declaration from that module. Type-only imports should remain separate.
