apiVersion: critiq.dev/v1alpha1
kind: Rule
metadata:
  id: ts.correctness.missing-default-dispatch
  title: Missing default case in switch or conditional dispatch
  summary: Dispatch constructs should include an explicit default or final else path.
  version: v1
  rationale: Without an explicit default or final else, dispatch constructs silently fall through for unhandled values, which can cause logic bugs, unexpected undefined returns, or incomplete handling when new cases are added. This is especially critical in reducers, event handlers, and dispatch functions where exhaustiveness matters.
  tags:
    - correctness
    - control-flow
  stability: stable
  appliesTo: block
scope:
  languages:
    - typescript
    - javascript
  paths:
    exclude:
      - "**/*.d.ts"
      - "**/*.generated.ts"
match:
  fact:
    kind: control-flow.missing-default-dispatch
    bind: issue
emit:
  finding:
    category: correctness.control-flow
    severity: medium
    confidence: 0.90
    tags:
      - correctness
      - control-flow
  message:
    title: Add an explicit default dispatch path
    summary: "Review `${captures.issue.text}` and add a `default` case or final `else`."
  remediation:
    summary: Handle the fallback branch explicitly so unexpected values do not rely on implicit behavior.
