name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify Release Tag
        run: node scripts/check-release-tag.mjs "${GITHUB_REF_NAME}"

      - name: Verify Release Readiness
        run: npm run release:verify

      - name: Generate Release Notes
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/release-notes.md"

      - name: Publish @critiq/cli
        run: npx nx run cli:publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "${RUNNER_TEMP}/release-notes.md"
